<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Browser — Logo
  Letters: O + B (first letters of "Open Browser")
  Style: pixel/block art
  Color: white only (#ffffff)
  Background: transparent
  ViewBox: 512×512
  Pixel size: 40×40 units per block
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     shape-rendering="crispEdges">

  <g fill="#ffffff">

    <!-- ═══════════════════════════════════════════
         LETTER  O  (pixel font, bold)
         Left half: cols 1–6  (x 40–280)
         Rows 1–11  (y 40–480)
    ═══════════════════════════════════════════ -->

    <!-- Top bar: row 1, cols 1-6 -->
    <rect x="40"  y="40"  width="240" height="40"/>

    <!-- Second row caps: cols 1-2 and 5-6 -->
    <rect x="40"  y="80"  width="80"  height="40"/>
    <rect x="200" y="80"  width="80"  height="40"/>

    <!-- Left & right pillars: rows 3-9 -->
    <rect x="40"  y="120" width="80"  height="280"/>
    <rect x="200" y="120" width="80"  height="280"/>

    <!-- Bottom cap second row: cols 1-2 and 5-6 -->
    <rect x="40"  y="400" width="80"  height="40"/>
    <rect x="200" y="400" width="80"  height="40"/>

    <!-- Bottom bar: row 11, cols 1-6 -->
    <rect x="40"  y="440" width="240" height="40"/>

    <!-- ═══════════════════════════════════════════
         LETTER  B  (pixel font, bold)
         Right half: cols 7–12  (x 280–512)
         Rows 1–11  (y 40–480)
    ═══════════════════════════════════════════ -->

    <!-- Left pillar of B: full height -->
    <rect x="296" y="40"  width="80"  height="440"/>

    <!-- Top bar: row 1 -->
    <rect x="376" y="40"  width="120" height="40"/>

    <!-- Top-right bump -->
    <rect x="456" y="80"  width="56"  height="40"/>
    <rect x="472" y="120" width="40"  height="80"/>
    <rect x="456" y="200" width="56"  height="40"/>

    <!-- Middle bar -->
    <rect x="376" y="240" width="80"  height="40"/>

    <!-- Bottom-right bump -->
    <rect x="456" y="280" width="56"  height="40"/>
    <rect x="472" y="320" width="40"  height="80"/>
    <rect x="456" y="400" width="56"  height="40"/>

    <!-- Bottom bar -->
    <rect x="376" y="440" width="120" height="40"/>

  </g>

</svg>
