<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#6a11cb"/>
    </linearGradient>
    
    <!-- Glass Effect Gradient -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>
  
  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.05)" filter="url(#glow)"/>
  <circle cx="1100" cy="575" r="250" fill="rgba(255,255,255,0.05)" filter="url(#glow)"/>
  <circle cx="600" cy="337" r="300" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Browser Window Frame -->
  <g transform="translate(200, 100)" filter="url(#shadow)">
    <!-- Window Background -->
    <rect x="0" y="0" width="800" height="475" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    
    <!-- Title Bar -->
    <rect x="0" y="0" width="800" height="50" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <rect x="0" y="30" width="800" height="20" fill="rgba(255,255,255,0.1)"/>
    
    <!-- Window Controls -->
    <circle cx="30" cy="25" r="8" fill="rgba(255,59,48,0.8)"/>
    <circle cx="55" cy="25" r="8" fill="rgba(255,149,0,0.8)"/>
    <circle cx="80" cy="25" r="8" fill="rgba(40,205,65,0.8)"/>
    
    <!-- Address Bar -->
    <rect x="120" y="12" width="550" height="26" rx="13" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="135" y="29" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">https://openbrowser.io</text>
    
    <!-- Tab Bar -->
    <rect x="0" y="50" width="800" height="40" fill="rgba(255,255,255,0.08)"/>
    
    <!-- Tabs -->
    <g transform="translate(10, 55)">
      <rect x="0" y="0" width="120" height="30" rx="8" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="11" fill="white">New Tab</text>
      <circle x="110" cy="15" r="6" fill="rgba(255,255,255,0.3)"/>
      <text x="107" y="18" font-family="Arial, sans-serif" font-size="10" fill="white">×</text>
    </g>
    
    <g transform="translate(140, 55)">
      <rect x="0" y="0" width="140" height="30" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Settings</text>
    </g>
    
    <g transform="translate(290, 55)">
      <rect x="0" y="0" width="100" height="30" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">History</text>
    </g>
    
    <!-- Content Area -->
    <rect x="20" y="100" width="760" height="355" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    
    <!-- Sidebar -->
    <rect x="20" y="100" width="200" height="355" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    
    <!-- Sidebar Items -->
    <g transform="translate(35, 130)">
      <rect x="0" y="0" width="170" height="35" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="15" y="22" font-family="Arial, sans-serif" font-size="12" fill="white">Appearance</text>
    </g>
    
    <g transform="translate(35, 175)">
      <rect x="0" y="0" width="170" height="35" rx="8" fill="rgba(96,165,250,0.2)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
      <text x="15" y="22" font-family="Arial, sans-serif" font-size="12" fill="#60a5fa">Privacy</text>
    </g>
    
    <g transform="translate(35, 220)">
      <rect x="0" y="0" width="170" height="35" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="15" y="22" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">Search</text>
    </g>
    
    <g transform="translate(35, 265)">
      <rect x="0" y="0" width="170" height="35" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="15" y="22" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">Performance</text>
    </g>
    
    <!-- Main Content Cards -->
    <g transform="translate(240, 100)">
      <rect x="0" y="30" width="540" height="60" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="white">Block Ads and Trackers</text>
      <rect x="480" y="45" width="40" height="20" rx="10" fill="#4ade80"/>
      <circle cx="510" cy="55" r="8" fill="white"/>
    </g>
    
    <g transform="translate(240, 170)">
      <rect x="0" y="30" width="540" height="60" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="white">HTTPS Upgrades</text>
      <rect x="480" y="45" width="40" height="20" rx="10" fill="#4ade80"/>
      <circle cx="510" cy="55" r="8" fill="white"/>
    </g>
    
    <g transform="translate(240, 210)">
      <rect x="0" y="30" width="540" height="60" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="white">Password Manager</text>
      <rect x="480" y="45" width="40" height="20" rx="10" fill="#4ade80"/>
      <circle cx="510" cy="55" r="8" fill="white"/>
    </g>
    
    <g transform="translate(240, 250)">
      <rect x="0" y="30" width="540" height="60" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="white">Hardware Acceleration</text>
      <rect x="480" y="45" width="40" height="20" rx="10" fill="#4ade80"/>
      <circle cx="510" cy="55" r="8" fill="white"/>
    </g>
    
    <g transform="translate(240, 290)">
      <rect x="0" y="30" width="540" height="60" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="white">Dark Mode</text>
      <rect x="480" y="45" width="40" height="20" rx="10" fill="rgba(255,255,255,0.3)"/>
      <circle cx="490" cy="55" r="8" fill="rgba(255,255,255,0.5)"/>
    </g>
  </g>
  
  <!-- Logo and Title -->
  <g transform="translate(600, 50)">
    <circle cx="0" cy="0" r="40" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="-25" y="8" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">OB</text>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">Open Browser</text>
  <text x="600" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">Privacy-Focused Web Browser for Linux</text>
  
  <!-- Version Badge -->
  <g transform="translate(1050, 50)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="rgba(74,222,128,0.3)" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <text x="50" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4ade80">v1.1.0</text>
  </g>
  
  <!-- Feature Badges -->
  <g transform="translate(50, 600)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">GTK4 + WebKit</text>
  </g>
  
  <g transform="translate(180, 600)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="50" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">C++20</text>
  </g>
  
  <g transform="translate(290, 600)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="55" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Glassmorphism</text>
  </g>
  
  <g transform="translate(410, 600)">
    <rect x="0" y="0" width="90" height="30" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="45" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Privacy</text>
  </g>
</svg>
