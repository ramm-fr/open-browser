app-id: io.openbrowser.Browser
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: open-browser

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.gnome.keyring
  - --talk-name=org.freedesktop.secrets
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures
  - --filesystem=xdg-music
  - --filesystem=xdg-videos
  - --filesystem=home/.local/share/open-browser:create
  - --filesystem=home/.config/open-browser:create

modules:
  - name: nlohmann-json
    buildsystem: cmake-ninja
    config-opts:
      - -DJSON_BuildTests=OFF
      - -DJSON_Install=ON
    sources:
      - type: archive
        url: https://github.com/nlohmann/json/archive/refs/tags/v3.11.3.tar.gz
        sha256: 0d8ef5af7f9794e3263480193c491549b2ba6cc74bb018906202ada498a79406

  - name: open-browser
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTS=OFF
    sources:
      - type: dir
        path: ../..
    post-install:
      - install -Dm644 resources/io.openbrowser.Browser.metainfo.xml
          /app/share/metainfo/io.openbrowser.Browser.metainfo.xml
