version: 1
script:
  - rm -rf AppDir
  - cmake -B build-appimage -G Ninja
      -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX=/usr
      -DBUILD_TESTS=OFF
  - cmake --build build-appimage --parallel
  - DESTDIR=$PWD/AppDir cmake --install build-appimage

AppDir:
  path: ./AppDir
  app_info:
    id: io.openbrowser.Browser
    name: Open Browser
    icon: io.openbrowser.Browser
    version: 1.0.0
    exec: usr/bin/open-browser
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu jammy main universe
        key_url: http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C
    include:
      - libgtk-4-1
      - libwebkit2gtk-4.1-0
      - libsoup-3.0-0
      - libsecret-1-0
      - libglib2.0-0
      - libgio-2.0-0
      - libpango-1.0-0
      - libcairo2
      - libgdk-pixbuf-2.0-0
      - libharfbuzz0b
      - libfontconfig1
    exclude: []

  runtime:
    env:
      PATH: '${APPDIR}/usr/bin:${PATH}'
      XDG_DATA_DIRS: '${APPDIR}/usr/share:${XDG_DATA_DIRS}'
      GI_TYPELIB_PATH: '${APPDIR}/usr/lib/x86_64-linux-gnu/girepository-1.0'

  files:
    include:
      - usr/bin/open-browser
      - usr/share/applications/io.openbrowser.Browser.desktop
      - usr/share/metainfo/io.openbrowser.Browser.metainfo.xml
      - usr/share/open-browser/

AppImage:
  arch: x86_64
  update-information: gh-releases-zsync|openbrowser|open-browser|latest|open-browser-*x86_64.AppImage.zsync
  sign-key: None
